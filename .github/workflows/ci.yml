name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel older runs of the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Pre-commit (lint, format, secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: precommit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    # The SPA depends on @seminary/portal-shell via a `link:` to a sibling
    # directory of frappe_giving. We replicate the dev layout in CI by
    # checking out frappe_giving and seminary as siblings under the workspace,
    # then installing portal-shell first so its `postinstall: vite build`
    # produces the dist that frappe_giving's import resolves against.
    steps:
      - name: Checkout frappe_giving
        uses: actions/checkout@v4
        with:
          path: frappe_giving

      - name: Checkout seminary (provides @seminary/portal-shell)
        uses: actions/checkout@v4
        with:
          repository: klisia-org/seminary
          path: seminary
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: |
            frappe_giving/frontend/yarn.lock
            seminary/portal-shell/yarn.lock

      - name: Build @seminary/portal-shell
        working-directory: seminary/portal-shell
        run: yarn install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frappe_giving/frontend
        run: yarn install --frozen-lockfile

      - name: Build (SPA + widget)
        working-directory: frappe_giving/frontend
        run: yarn build

  semgrep:
    name: Semgrep (Frappe rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install semgrep
        run: pip install semgrep

      - name: Download Frappe Semgrep rules
        run: git clone --depth 1 https://github.com/frappe/semgrep-rules.git frappe-semgrep-rules

      - name: Run Semgrep
        run: |
          semgrep \
            --config ./frappe-semgrep-rules/rules \
            --exclude node_modules \
            --exclude .history \
            --exclude frappe_giving/public/frontend \
            --exclude frappe_giving/builder_files \
            --exclude scripts \
            --error \
            --metrics=off
