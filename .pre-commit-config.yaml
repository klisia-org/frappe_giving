exclude: 'node_modules|.git'
default_stages: [pre-commit]
fail_fast: false


repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: "frappe_giving.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg|.*html|.*/public/frontend/.*"
      - id: check-yaml
        exclude: '.history/.*'
      - id: check-merge-conflict
      - id: check-ast
        exclude: '.history/.*'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: ["--fix"]
        exclude: '.history/.*'
      - id: ruff-format
        exclude: '.history/.*'

  - repo: https://github.com/pycqa/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        exclude: '.history/.*'
        args: ["-c","bandit.yaml"]


  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: '.history/.*|README.md|frappe_giving/public/frontend/assets/.*'

  - repo: local
    hooks:
      - id: stabilize-pot
        name: Stabilize POT file (prevent translation churn)
        entry: python scripts/stabilize-pot.py
        language: python
        always_run: true
        pass_filenames: false
